{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary fw-bold">Purchase Orders</h2>
    <a href="{% url 'inventory:purchase_order_create' %}" class="btn btn-primary">
        <i class="bi bi-file-earmark-plus"></i> Create Purchase Order
    </a>
</div>

<!-- Purchase Orders Table -->
<div class="card shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="poTable">
                <thead class="bg-light">
                    <tr>
                        <th class="ps-4">PO #</th>
                        <th>Date</th>
                        <th>Supplier</th>
                        <th>Branch</th>
                        <th>Status</th>
                        <th>Total Amount</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="poTableBody">
                    <tr>
                        <td colspan="7" class="text-center py-4">Loading purchase orders...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        fetchData();
    });

    async function fetchData() {
        try {
            const response = await fetch('/api/purchase-orders/');
            const data = await response.json();
            renderTable(data);
        } catch (error) {
            console.error(error);
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('poTableBody');
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No purchase orders found</td></tr>';
            return;
        }

        const BADGE = { draft: 'secondary', sent: 'info', awaiting_check: 'warning',
                        discrepancy: 'danger', received: 'success', cancelled: 'dark' };
        const LABEL = { draft: 'Draft', sent: 'Sent', awaiting_check: 'Awaiting Store Check',
                        discrepancy: 'Discrepancy', received: 'Received', cancelled: 'Cancelled' };

        data.forEach(po => {
            const tr = document.createElement('tr');
            const badge = BADGE[po.status] || 'secondary';
            const label = LABEL[po.status] || po.status.toUpperCase();

            let actions = `
                <button class="btn btn-sm btn-outline-primary" onclick="viewDetails(${po.id})"><i class="bi bi-eye"></i></button>
                <a class="btn btn-sm btn-outline-danger" href="/api/purchase-orders/${po.id}/pdf/" target="_blank" rel="noopener" title="Download PO PDF"><i class="bi bi-file-earmark-pdf"></i> PDF</a>`;

            if (po.status === 'draft' || po.status === 'sent') {
                actions += `<button class="btn btn-sm btn-success ms-1" onclick="confirmOrder(${po.id})" title="Confirm & send to Store Manager for cross-check"><i class="bi bi-send-check"></i> Confirm</button>
                            <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteOrder(${po.id})" title="Delete order"><i class="bi bi-trash"></i></button>`;
            } else if (po.status === 'awaiting_check') {
                actions += `<span class="badge bg-warning-subtle text-warning ms-1"><i class="bi bi-hourglass-split"></i> With Store Manager</span>`;
            } else if (po.status === 'discrepancy') {
                actions += `<button class="btn btn-sm btn-warning ms-1" onclick="addComment(${po.id})" title="Delivery incomplete — add your comment"><i class="bi bi-chat-left-text"></i> ${po.afisa_comment ? 'Edit Comment' : 'Add Comment'}</button>`;
            } else if (po.status === 'received') {
                actions += `<span class="badge bg-success-subtle text-success ms-1"><i class="bi bi-check2-circle"></i> Received</span>`;
            }

            tr.innerHTML = `
                <td class="ps-4 fw-bold">#${po.id}</td>
                <td class="text-muted">${new Date(po.order_date).toLocaleDateString()}</td>
                <td class="fw-medium">${po.supplier_name || '-'}</td>
                <td><span class="badge bg-light text-dark border">${po.branch_name || '-'}</span></td>
                <td><span class="badge bg-${badge}">${label}</span></td>
                <td class="fw-bold">TZS ${Math.round(Number(po.total_amount)).toLocaleString()}</td>
                <td>${actions}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function deleteOrder(id) {
        const result = await Swal.fire({
            icon: 'warning', title: 'Delete this order?',
            text: 'The purchase order will be permanently removed. (Only allowed before goods are received.)',
            showCancelButton: true, confirmButtonColor: '#dc3545', confirmButtonText: 'Delete'
        });
        if (!result.isConfirmed) return;
        try {
            const res = await fetch(`/api/purchase-orders/${id}/`, { method: 'DELETE', headers: { 'X-CSRFToken': '{{ csrf_token }}' } });
            if (res.ok) { Swal.fire({ icon: 'success', title: 'Deleted', timer: 1400, showConfirmButton: false }); fetchData(); }
            else { let msg='Failed to delete.'; try { const e=await res.json(); msg=e.detail||msg; } catch(_){} Swal.fire('Error', msg, 'error'); }
        } catch (e) { Swal.fire('Error', 'Network error.', 'error'); }
    }

    async function confirmOrder(id) {
        const result = await Swal.fire({
            icon: 'question', title: 'Confirm this order?',
            text: 'It will be sent to the Store Manager to cross-check the delivered goods against what was ordered.',
            showCancelButton: true, confirmButtonColor: '#198754', confirmButtonText: 'Yes, confirm'
        });
        if (!result.isConfirmed) return;
        try {
            const res = await fetch(`/api/purchase-orders/${id}/confirm/`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' }
            });
            const data = await res.json();
            if (res.ok) { Swal.fire({ icon: 'success', title: 'Sent for cross-check', text: data.detail, timer: 2200, showConfirmButton: false }); fetchData(); }
            else { Swal.fire('Error', data.detail || (res.status === 403 ? "You don't have permission." : 'Failed.'), 'error'); }
        } catch (e) { Swal.fire('Error', 'Network error.', 'error'); }
    }

    async function addComment(id) {
        // Fetch the PO so Afisa Ugavi can see delivered vs ordered before commenting.
        let po;
        try { po = await (await fetch(`/api/purchase-orders/${id}/`)).json(); }
        catch (e) { Swal.fire('Error', 'Could not load the order.', 'error'); return; }

        const rows = (po.items || []).map(it => {
            const d = (it.delivered_quantity == null) ? '—' : it.delivered_quantity;
            const short = it.delivered_quantity != null && it.delivered_quantity !== it.quantity;
            return `<tr class="${short ? 'table-danger' : ''}">
                <td style="text-align:left;">${it.product_name || it.product}</td>
                <td>${it.quantity}</td><td>${d}</td></tr>`;
        }).join('');

        const { value: comment } = await Swal.fire({
            title: `PO-${String(po.id).padStart(5, '0')} — Discrepancy`,
            html: `
                <table class="table table-sm" style="font-size:.85rem;">
                    <thead><tr><th style="text-align:left;">Product</th><th>Ordered</th><th>Delivered</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
                ${po.store_note ? `<div class="text-muted small mb-2">Store note: ${po.store_note}</div>` : ''}
                <textarea id="afisaComment" class="form-control" rows="3" placeholder="Explain why the goods are not complete…">${po.afisa_comment || ''}</textarea>`,
            showCancelButton: true, confirmButtonText: 'Save comment',
            preConfirm: () => {
                const v = document.getElementById('afisaComment').value.trim();
                if (!v) { Swal.showValidationMessage('A comment is required.'); }
                return v;
            }
        });
        if (!comment) return;

        try {
            const res = await fetch(`/api/purchase-orders/${id}/comment/`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify({ comment })
            });
            const data = await res.json();
            if (res.ok) { Swal.fire({ icon: 'success', title: 'Comment saved', timer: 1600, showConfirmButton: false }); fetchData(); }
            else { Swal.fire('Error', data.detail || 'Failed.', 'error'); }
        } catch (e) { Swal.fire('Error', 'Network error.', 'error'); }
    }

    function viewDetails(id) {
        // Implement view details logic (e.g., modal or redirection)
        alert('View details for PO #' + id);
    }
</script>
{% endblock %}
