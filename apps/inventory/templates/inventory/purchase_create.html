{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-10 offset-md-1">
        <div class="card shadow-sm border-0 border-top border-primary border-4">
            <div class="card-header bg-white py-3">
                <h4 class="fw-bold text-primary mb-0"><i class="bi bi-cart-plus me-2"></i>Record New Purchase</h4>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Supplier</label>
                        <select class="form-select" id="supplierSelect" required>
                            <option value="">Select Supplier...</option>
                        </select>
                        <div class="form-text"><a href="{% url 'inventory:manage_supplier' %}" class="text-decoration-none">Add new supplier</a></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Destination Branch</label>
                        <select class="form-select" id="branchSelect" required>
                            <option value="">Select Branch...</option>
                        </select>
                    </div>
                </div>

                <div class="card bg-light mb-3">
                    <div class="card-body">
                        <h6 class="fw-bold mb-3">Add Items <span class="text-muted small fw-normal">— add as many products as you need</span></h6>
                        <form id="itemForm" class="row g-2 align-items-end">
                            <div class="col-md-4">
                                <label class="form-label">Product</label>
                                <select class="form-select" id="productSelect" required>
                                    <option value="">Select Product...</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Quantity</label>
                                <input type="number" class="form-control" id="quantity" min="1" required>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Unit</label>
                                <select class="form-select" id="unitSelect">
                                    <option value="pcs">Pcs</option>
                                    <option value="item">Item</option>
                                    <option value="bundle">Bundle</option>
                                    <option value="box">Box</option>
                                    <option value="carton">Carton</option>
                                    <option value="dozen">Dozen</option>
                                    <option value="bag">Bag</option>
                                    <option value="roll">Roll</option>
                                    <option value="kg">Kg</option>
                                    <option value="ton">Ton</option>
                                    <option value="meter">Meter</option>
                                    <option value="litre">Litre</option>
                                    <option value="set">Set</option>
                                    <option value="pair">Pair</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Unit Cost</label>
                                <input type="number" class="form-control" id="unitCost" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-success w-100"><i class="bi bi-plus-lg"></i> Add</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-sm table-bordered align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Product</th>
                                <th class="text-end">Qty</th>
                                <th>Unit</th>
                                <th class="text-end">Unit Cost</th>
                                <th class="text-end">Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="itemsBody">
                            <tr><td colspan="6" class="text-center text-muted py-3">No items yet — add products above.</td></tr>
                        </tbody>
                        <tfoot>
                            <tr class="fw-bold bg-light">
                                <td colspan="4" class="text-end">Grand Total:</td>
                                <td class="text-end" id="grandTotal">TZS 0</td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                <div class="d-grid mt-3">
                    <button type="button" class="btn btn-primary btn-lg fw-bold" id="submitBtn" onclick="recordPurchase()">
                        <i class="bi bi-check-circle me-1"></i> Record Purchase
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-4" id="recentAddedSection" style="display:none;">
            <h5 class="text-muted">Just Recorded</h5>
            <ul class="list-group shadow-sm" id="addedList"></ul>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let products = [], suppliers = [], branches = [];
    let lineItems = [];   // [{product, product_name, quantity, unit_cost}]

    document.addEventListener('DOMContentLoaded', async () => {
        await fetchData();
        document.getElementById('itemForm').addEventListener('submit', addItem);
    });

    async function fetchData() {
        try {
            const [prodRes, suppRes, branchRes] = await Promise.all([
                fetch('/api/products/'), fetch('/api/suppliers/'), fetch('/api/branches/')
            ]);
            products = await prodRes.json();
            suppliers = await suppRes.json();
            branches = await branchRes.json();
            const pSelect = document.getElementById('productSelect');
            products.forEach(p => pSelect.add(new Option(`${p.name} (${p.sku})`, p.id)));
            const sSelect = document.getElementById('supplierSelect');
            suppliers.forEach(s => sSelect.add(new Option(s.name, s.id)));
            const bSelect = document.getElementById('branchSelect');
            branches.forEach(b => bSelect.add(new Option(b.name, b.id)));
        } catch (e) { console.error(e); }
    }

    function fmt(n) { return Math.round(Number(n)).toLocaleString(); }

    function addItem(e) {
        e.preventDefault();
        const sel = document.getElementById('productSelect');
        const product = sel.value;
        const productName = sel.options[sel.selectedIndex].text;
        const quantity = parseInt(document.getElementById('quantity').value, 10);
        const unitSel = document.getElementById('unitSelect');
        const unit = unitSel.value;
        const unitLabel = unitSel.options[unitSel.selectedIndex].text;
        const unitCost = parseFloat(document.getElementById('unitCost').value);
        if (!product || !(quantity > 0) || !(unitCost >= 0)) {
            Swal.fire('Missing info', 'Select a product and enter quantity & unit cost.', 'warning');
            return;
        }
        lineItems.push({ product, product_name: productName, quantity, unit, unit_label: unitLabel, unit_cost: unitCost });
        renderItems();
        document.getElementById('itemForm').reset();
        document.getElementById('productSelect').focus();
    }

    function removeItem(idx) { lineItems.splice(idx, 1); renderItems(); }

    function renderItems() {
        const tbody = document.getElementById('itemsBody');
        tbody.innerHTML = '';
        if (!lineItems.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">No items yet — add products above.</td></tr>';
            document.getElementById('grandTotal').innerText = 'TZS 0';
            return;
        }
        let total = 0;
        lineItems.forEach((it, idx) => {
            const lineTotal = it.quantity * it.unit_cost;
            total += lineTotal;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${it.product_name}</td>
                <td class="text-end">${it.quantity}</td>
                <td>${it.unit_label || it.unit}</td>
                <td class="text-end">${fmt(it.unit_cost)}</td>
                <td class="text-end fw-semibold">${fmt(lineTotal)}</td>
                <td class="text-center"><button class="btn btn-sm btn-outline-danger border-0" onclick="removeItem(${idx})" title="Remove"><i class="bi bi-x-lg"></i></button></td>`;
            tbody.appendChild(tr);
        });
        document.getElementById('grandTotal').innerText = 'TZS ' + fmt(total);
    }

    async function recordPurchase() {
        const supplier = document.getElementById('supplierSelect').value;
        const branch = document.getElementById('branchSelect').value;
        if (!supplier || !branch) { Swal.fire('Missing info', 'Select a supplier and branch.', 'warning'); return; }
        if (!lineItems.length) { Swal.fire('No items', 'Add at least one product.', 'warning'); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Saving…';

        // Create ONE purchase order with all products. Stock is NOT changed here —
        // it updates only when the goods are confirmed received.
        const payload = {
            supplier, branch, status: 'draft',
            items_input: lineItems.map(i => ({ product: i.product, quantity: i.quantity, unit: i.unit, unit_cost: i.unit_cost }))
        };
        try {
            const res = await fetch('/api/purchase-orders/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                const po = await res.json();
                Swal.fire({
                    icon: 'success',
                    title: 'Purchase Order created',
                    html: `PO #${po.id} created with ${lineItems.length} product(s) as one order.<br><small class="text-muted">Stock updates when you confirm the goods arrived.</small>`,
                    confirmButtonText: 'Open PO PDF',
                    showCancelButton: true,
                    cancelButtonText: 'Go to Purchase Management'
                }).then((result) => {
                    if (result.isConfirmed) window.open(`/api/purchase-orders/${po.id}/pdf/`, '_blank');
                    window.location.href = "{% url 'inventory:purchases_list' %}";
                });
            } else {
                let msg = 'Failed to create the purchase order.';
                try { const err = await res.json(); msg = err.detail || JSON.stringify(err); } catch (_) {}
                Swal.fire('Error', msg, 'error');
                btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-circle me-1"></i> Record Purchase';
            }
        } catch (e) {
            console.error(e);
            Swal.fire('Error', 'Network error while creating the order.', 'error');
            btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-circle me-1"></i> Record Purchase';
        }
    }
</script>
{% endblock %}
