{% extends 'base.html' %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{% url 'inventory:purchase_order_list' %}" class="btn btn-outline-secondary me-3">
        <i class="bi bi-arrow-left"></i> Back
    </a>
    <h2 class="text-primary fw-bold mb-0">Create Purchase Order</h2>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-light fw-bold">Order Details</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Supplier</label>
                    <select class="form-select" id="poSupplier" required></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Branch</label>
                    <select class="form-select" id="poBranch" required></select>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-light fw-bold">Order Items</div>
            <div class="card-body">
                <form id="itemForm" class="row g-2 align-items-end mb-3">
                    <div class="col-md-5">
                        <label class="form-label">Product</label>
                        <select class="form-select" id="poProduct" required onchange="updateUnitCost()"></select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Qty</label>
                        <input type="number" class="form-control" id="poQty" required min="1">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Unit Cost</label>
                        <input type="number" class="form-control" id="poCost" required step="0.01" min="0">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success w-100"><i class="bi bi-plus-lg"></i> Add</button>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-sm table-bordered align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Product</th>
                                <th class="text-end">Qty</th>
                                <th class="text-end">Unit Cost</th>
                                <th class="text-end">Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="poItemsBody">
                            <tr><td colspan="5" class="text-center text-muted py-3">Add one or more products to the order…</td></tr>
                        </tbody>
                        <tfoot>
                            <tr class="fw-bold bg-light">
                                <td colspan="3" class="text-end">Grand Total:</td>
                                <td class="text-end" id="poTotal">TZS 0.00</td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                <div class="mt-3 text-end">
                    <button class="btn btn-primary btn-lg" id="submitBtn" onclick="submitOrder()">
                        <i class="bi bi-check-lg"></i> Create Purchase Order
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let products = [];
    let lineItems = [];   // [{product, product_name, quantity, unit_cost}]

    document.addEventListener('DOMContentLoaded', function () {
        fetchInitialData();
        document.getElementById('itemForm').addEventListener('submit', addItem);
    });

    async function fetchInitialData() {
        try {
            const [supRes, branchRes, prodRes] = await Promise.all([
                fetch('/api/suppliers/'), fetch('/api/branches/'), fetch('/api/products/')
            ]);
            const suppliers = await supRes.json();
            const branches = await branchRes.json();
            products = await prodRes.json();
            populateSelect('poSupplier', suppliers);
            populateSelect('poBranch', branches);
            const prodSelect = document.getElementById('poProduct');
            prodSelect.innerHTML = '<option value="">Select Product...</option>';
            products.forEach(p => {
                prodSelect.innerHTML += `<option value="${p.id}" data-cost="${p.cost}">${p.name}</option>`;
            });
        } catch (e) { console.error(e); }
    }

    function populateSelect(id, items) {
        const select = document.getElementById(id);
        select.innerHTML = '<option value="">Select...</option>';
        items.forEach(i => { select.innerHTML += `<option value="${i.id}">${i.name}</option>`; });
    }

    function updateUnitCost() {
        const select = document.getElementById('poProduct');
        const cost = select.options[select.selectedIndex].dataset.cost;
        if (cost) document.getElementById('poCost').value = cost;
    }

    function addItem(e) {
        e.preventDefault();
        const sel = document.getElementById('poProduct');
        const productId = sel.value;
        const productName = sel.options[sel.selectedIndex].text;
        const quantity = parseInt(document.getElementById('poQty').value, 10);
        const unitCost = parseFloat(document.getElementById('poCost').value);
        if (!productId || !(quantity > 0) || !(unitCost >= 0)) {
            Swal.fire('Missing info', 'Select a product and enter quantity & unit cost.', 'warning');
            return;
        }
        lineItems.push({ product: productId, product_name: productName, quantity, unit_cost: unitCost });
        renderItems();
        document.getElementById('itemForm').reset();
        document.getElementById('poProduct').focus();
    }

    function removeItem(idx) {
        lineItems.splice(idx, 1);
        renderItems();
    }

    function fmt(n) { return parseFloat(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

    function renderItems() {
        const tbody = document.getElementById('poItemsBody');
        tbody.innerHTML = '';
        if (!lineItems.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">Add one or more products to the order…</td></tr>';
            document.getElementById('poTotal').innerText = 'TZS 0.00';
            return;
        }
        let total = 0;
        lineItems.forEach((it, idx) => {
            const lineTotal = it.quantity * it.unit_cost;
            total += lineTotal;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${it.product_name}</td>
                <td class="text-end">${it.quantity}</td>
                <td class="text-end">${fmt(it.unit_cost)}</td>
                <td class="text-end fw-semibold">${fmt(lineTotal)}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-danger border-0" onclick="removeItem(${idx})" title="Remove"><i class="bi bi-x-lg"></i></button>
                </td>`;
            tbody.appendChild(tr);
        });
        document.getElementById('poTotal').innerText = 'TZS ' + fmt(total);
    }

    async function submitOrder() {
        const supplier = document.getElementById('poSupplier').value;
        const branch = document.getElementById('poBranch').value;
        if (!supplier || !branch) { Swal.fire('Missing info', 'Select a supplier and branch.', 'warning'); return; }
        if (!lineItems.length) { Swal.fire('No items', 'Add at least one product to the order.', 'warning'); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Saving…';

        const payload = {
            supplier, branch, status: 'draft',
            items_input: lineItems.map(i => ({ product: i.product, quantity: i.quantity, unit_cost: i.unit_cost })),
        };
        try {
            const res = await fetch('/api/purchase-orders/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                const po = await res.json();
                Swal.fire({
                    icon: 'success',
                    title: 'Purchase Order created',
                    html: `PO #${po.id} with ${lineItems.length} product(s) created as one order.`,
                    confirmButtonText: 'Open PO PDF for printing',
                    showCancelButton: true,
                    cancelButtonText: 'Back to list'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.open(`/api/purchase-orders/${po.id}/pdf/`, '_blank');
                    }
                    window.location.href = "{% url 'inventory:purchase_order_list' %}";
                });
            } else {
                let msg = 'Failed to create the purchase order.';
                try { const err = await res.json(); msg = err.detail || JSON.stringify(err); } catch (_) {}
                Swal.fire('Error', msg, 'error');
                btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-lg"></i> Create Purchase Order';
            }
        } catch (e) {
            console.error(e);
            Swal.fire('Error', 'Network error while creating the order.', 'error');
            btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-lg"></i> Create Purchase Order';
        }
    }
</script>
{% endblock %}
