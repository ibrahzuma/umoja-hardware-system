{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="text-primary fw-bold mb-1">Purchase Management</h2>
        <p class="text-muted mb-0 small">Each purchase is one order. Stock is added only when you confirm the goods arrived.</p>
    </div>
    <a class="btn btn-primary" href="{% url 'inventory:purchase_create' %}">
        <i class="bi bi-cart-plus"></i> Record Purchase
    </a>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="ps-4">Date</th>
                        <th>Order #</th>
                        <th>Supplier</th>
                        <th>Branch</th>
                        <th>Items</th>
                        <th class="text-end">Total</th>
                        <th>Status</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody id="poTableBody">
                    <tr><td colspan="8" class="text-center py-4">Loading orders…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let orders = [];

    document.addEventListener('DOMContentLoaded', loadOrders);

    async function loadOrders() {
        try {
            const res = await fetch('/api/purchase-orders/');
            if (!res.ok) throw new Error('failed');
            orders = await res.json();
            renderOrders();
        } catch (e) {
            console.error(e);
            document.getElementById('poTableBody').innerHTML =
                '<tr><td colspan="8" class="text-center py-4 text-danger">Could not load orders.</td></tr>';
        }
    }

    function statusBadge(s) {
        const map = { draft: 'secondary', sent: 'primary', received: 'success', cancelled: 'danger' };
        return `<span class="badge bg-${map[s] || 'secondary'}">${(s || '').toUpperCase()}</span>`;
    }

    function renderOrders() {
        const tbody = document.getElementById('poTableBody');
        tbody.innerHTML = '';
        if (!orders.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">No purchase orders yet. Click “Record Purchase”.</td></tr>';
            return;
        }
        orders.forEach(o => {
            const itemCount = (o.items || []).length;
            const received = o.status === 'received';
            const confirmBtn = received
                ? '<span class="badge bg-success-subtle text-success"><i class="bi bi-check2-circle"></i> Received</span>'
                : `<button class="btn btn-sm btn-success" onclick="confirmReceived(${o.id})" title="Confirm goods arrived (adds to stock)"><i class="bi bi-box-arrow-in-down"></i> Confirm Received</button>`;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="ps-4 text-muted">${o.order_date ? new Date(o.order_date).toLocaleDateString() : '-'}</td>
                <td class="fw-bold">PO-${String(o.id).padStart(5, '0')}</td>
                <td class="fw-medium">${o.supplier_name || '-'}</td>
                <td><span class="badge bg-light text-dark border">${o.branch_name || '-'}</span></td>
                <td>${itemCount}</td>
                <td class="text-end fw-bold">TZS ${parseFloat(o.total_amount || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                <td>${statusBadge(o.status)}</td>
                <td class="text-end pe-4">
                    <a class="btn btn-sm btn-outline-danger" href="/api/purchase-orders/${o.id}/pdf/" target="_blank" rel="noopener" title="Download PDF"><i class="bi bi-file-earmark-pdf"></i> PDF</a>
                    ${confirmBtn}
                </td>`;
            tbody.appendChild(tr);
        });
    }

    async function confirmReceived(id) {
        const result = await Swal.fire({
            icon: 'question',
            title: 'Confirm goods received?',
            text: 'This will add all items on this order to stock. It can only be done once.',
            showCancelButton: true,
            confirmButtonColor: '#198754',
            confirmButtonText: 'Yes, goods arrived'
        });
        if (!result.isConfirmed) return;
        try {
            const res = await fetch(`/api/purchase-orders/${id}/receive/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' }
            });
            const data = await res.json();
            if (res.ok) {
                Swal.fire({ icon: 'success', title: 'Goods Received', text: data.detail || 'Stock updated.', timer: 1900, showConfirmButton: false });
                loadOrders();
            } else {
                Swal.fire('Error', data.detail || 'Failed to confirm receipt.', 'error');
            }
        } catch (e) {
            console.error(e);
            Swal.fire('Error', 'Network error.', 'error');
        }
    }
</script>
{% endblock %}
