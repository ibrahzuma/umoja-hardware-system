{% extends 'base.html' %}

{% block title %}{{ title }} · Umoja Hardware{% endblock %}

{% block page_header %}
<div class="page-header">
    <div>
        <div class="eyebrow">{{ resource|cut:"?"|default:"List" }}</div>
        <h2>{{ title }}</h2>
    </div>
    <div class="d-flex gap-2">
        <div class="topbar-search" style="max-width: 240px;">
            <i class="bi bi-search"></i>
            <input type="search" id="list-filter" placeholder="Filter…" aria-label="Filter">
        </div>
        <button class="btn btn-primary" onclick="openCreateModal()" type="button">
            <i class="bi bi-plus-lg"></i> Add new
        </button>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="card">
    <div class="table-responsive">
        <table class="table table-hover mb-0" id="data-table">
            <thead>
                <tr id="table-headers"></tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="100%" class="text-center text-muted py-5">
                        <div class="d-inline-flex flex-column align-items-center gap-2">
                            <div class="spinner-border spinner-border-sm text-muted" role="status"></div>
                            <span class="small">Loading…</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Generic Create/Edit Modal -->
<div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add item</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="genericBoxForm">
                    <!-- Fields injected by JS -->
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="submitForm()">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/api_service.js"></script>
<script>
    const RESOURCE = "{{ resource }}";
    const api = new ApiService();
    let fields = [];
    let lastItems = [];

    async function loadData() {
        try {
            let url;
            if (RESOURCE.includes('?')) {
                const parts = RESOURCE.split('?');
                url = `/api/${parts[0]}/?${parts[1]}`;
            } else {
                url = `/api/${RESOURCE}/`;
            }
            const data = await api.get(url);
            const items = Array.isArray(data) ? data : data.results;
            lastItems = items;
            renderTable(items);
        } catch (error) {
            console.error(error);
            document.getElementById('table-body').innerHTML = `
                <tr><td colspan="100%" class="text-center text-danger py-4">
                    <i class="bi bi-exclamation-triangle me-1"></i> Error loading data
                </td></tr>`;
        }
    }

    function renderTable(items) {
        const thead = document.getElementById('table-headers');
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        thead.innerHTML = '';

        if (items.length === 0) {
            tbody.innerHTML = `
                <tr><td colspan="100%" class="text-center text-muted py-5">
                    <div class="d-inline-flex flex-column align-items-center gap-2">
                        <i class="bi bi-inbox fs-2 text-muted"></i>
                        <div class="fw-semibold">No data yet</div>
                        <div class="small">Click "Add new" to create your first entry.</div>
                    </div>
                </td></tr>`;
            return;
        }

        const columns = Object.keys(items[0]).filter(k => !['id', 'created_at'].includes(k));

        columns.forEach(col => {
            const th = document.createElement('th');
            th.innerText = col.replace(/_/g, ' ');
            thead.appendChild(th);
        });
        const actionTh = document.createElement('th');
        actionTh.innerText = 'Actions';
        actionTh.style.width = '120px';
        thead.appendChild(actionTh);

        items.forEach(item => {
            const tr = document.createElement('tr');
            columns.forEach(col => {
                const td = document.createElement('td');
                td.innerText = item[col] ?? '—';
                tr.appendChild(td);
            });
            const actionsTd = document.createElement('td');
            actionsTd.innerHTML = `
                <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-secondary" onclick="editItem(${item.id})" title="Edit"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="deleteItem(${item.id})" title="Delete"><i class="bi bi-trash"></i></button>
                </div>`;
            tr.appendChild(actionsTd);
            tbody.appendChild(tr);
        });
    }

    function openCreateModal() {
        const modal = new bootstrap.Modal(document.getElementById('formModal'));
        modal.show();
    }
    function editItem(id) { alert("Edit not implemented in this quick demo yet: " + id); }
    async function deleteItem(id) {
        if (confirm("Are you sure?")) {
            await api.delete(`/api/${RESOURCE}/${id}/`);
            loadData();
        }
    }

    // Client-side filter
    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        const filter = document.getElementById('list-filter');
        if (filter) {
            filter.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = lastItems.filter(item =>
                    Object.values(item).some(v => String(v ?? '').toLowerCase().includes(term))
                );
                renderTable(filtered);
            });
        }
    });
</script>
{% endblock %}
